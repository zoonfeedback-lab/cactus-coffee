<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2518"/>
      <stop offset="50%" style="stop-color:#4a3528"/>
      <stop offset="100%" style="stop-color:#2a1a10"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Coffee cup silhouettes -->
  <ellipse cx="300" cy="600" rx="80" ry="100" fill="#5a4030" opacity="0.4"/>
  <ellipse cx="300" cy="510" rx="80" ry="20" fill="#6a5040" opacity="0.5"/>
  <rect x="370" y="560" width="30" height="60" rx="8" fill="#5a4030" opacity="0.4"/>
  <!-- Steam wisps -->
  <ellipse cx="280" cy="460" rx="15" ry="30" fill="#f5e6d3" opacity="0.08" transform="rotate(-10 280 460)"/>
  <ellipse cx="310" cy="440" rx="12" ry="35" fill="#f5e6d3" opacity="0.06" transform="rotate(5 310 440)"/>
  <ellipse cx="330" cy="450" rx="10" ry="25" fill="#f5e6d3" opacity="0.07" transform="rotate(-8 330 450)"/>
  <!-- Coffee beans scattered -->
  <ellipse cx="800" cy="700" rx="25" ry="15" fill="#6B4226" opacity="0.5" transform="rotate(30 800 700)"/>
  <ellipse cx="850" cy="730" rx="20" ry="12" fill="#7B5236" opacity="0.4" transform="rotate(-20 850 730)"/>
  <ellipse cx="1100" cy="650" rx="22" ry="14" fill="#6B4226" opacity="0.45" transform="rotate(45 1100 650)"/>
  <ellipse cx="1150" cy="680" rx="18" ry="11" fill="#7B5236" opacity="0.35" transform="rotate(-15 1150 680)"/>
  <ellipse cx="1500" cy="600" rx="24" ry="14" fill="#6B4226" opacity="0.4" transform="rotate(60 1500 600)"/>
  <!-- Warm ambient shapes -->
  <rect x="600" y="350" width="500" height="350" rx="16" fill="#5a4030" opacity="0.25"/>
  <rect x="1250" y="400" width="350" height="280" rx="12" fill="#4a3020" opacity="0.3"/>
  <ellipse cx="960" cy="120" rx="140" ry="60" fill="#f5e6d3" opacity="0.08"/>
  <!-- Bottom bar -->
  <rect x="0" y="880" width="1920" height="200" fill="#1a0e06" opacity="0.3"/>
</svg>
