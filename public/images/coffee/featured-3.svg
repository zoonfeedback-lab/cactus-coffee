<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#3a2a1a" rx="16"/>
  <!-- Wide cup / bowl -->
  <ellipse cx="300" cy="250" rx="110" ry="80" fill="#5a4030" opacity="0.5"/>
  <ellipse cx="300" cy="180" rx="110" ry="25" fill="#6a5040" opacity="0.6"/>
  <!-- Latte art - rosette -->
  <ellipse cx="300" cy="190" rx="60" ry="12" fill="#f5e6d3" opacity="0.2"/>
  <ellipse cx="300" cy="195" rx="35" ry="8" fill="#f5e6d3" opacity="0.15"/>
  <ellipse cx="280" cy="192" rx="15" ry="6" fill="#f5e6d3" opacity="0.12" transform="rotate(-20 280 192)"/>
  <ellipse cx="320" cy="192" rx="15" ry="6" fill="#f5e6d3" opacity="0.12" transform="rotate(20 320 192)"/>
  <!-- Rose petals accent -->
  <ellipse cx="440" cy="320" rx="20" ry="12" fill="#c47a7a" opacity="0.25" transform="rotate(30 440 320)"/>
  <ellipse cx="460" cy="340" rx="15" ry="10" fill="#c47a7a" opacity="0.2" transform="rotate(-15 460 340)"/>
  <!-- Cardamom pods -->
  <ellipse cx="160" cy="310" rx="10" ry="16" fill="#5a7a4a" opacity="0.3" transform="rotate(20 160 310)"/>
  <ellipse cx="180" cy="330" rx="8" ry="14" fill="#5a7a4a" opacity="0.25" transform="rotate(-10 180 330)"/>
</svg>
