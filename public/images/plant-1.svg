<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="600" fill="#f0f5ef"/>
  <!-- Pot -->
  <rect x="220" y="420" width="160" height="120" rx="8" fill="#c4956a"/>
  <rect x="210" y="410" width="180" height="20" rx="4" fill="#b8855a"/>
  <!-- Soil -->
  <ellipse cx="300" cy="420" rx="80" ry="15" fill="#5a3a2a"/>
  <!-- Stem -->
  <line x1="300" y1="420" x2="300" y2="200" stroke="#2D5A3D" stroke-width="8"/>
  <!-- Large leaves (Monstera-style) -->
  <ellipse cx="240" cy="250" rx="80" ry="50" fill="#3a8a4a" transform="rotate(-30 240 250)"/>
  <ellipse cx="360" cy="220" rx="70" ry="45" fill="#2D5A3D" transform="rotate(20 360 220)"/>
  <ellipse cx="280" cy="180" rx="75" ry="48" fill="#4a9a5a" transform="rotate(-10 280 180)"/>
  <ellipse cx="340" cy="300" rx="65" ry="40" fill="#3a7a4a" transform="rotate(15 340 300)"/>
  <!-- Leaf holes -->
  <circle cx="240" cy="240" r="12" fill="#f0f5ef"/>
  <circle cx="350" cy="210" r="10" fill="#f0f5ef"/>
</svg>
